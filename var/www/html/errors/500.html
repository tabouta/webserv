<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<title>500 - Erreur interne du serveur</title>
	<style>
		body {
			background-color: #1e1e1e;
			color: #f2f2f2;
			font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100vh;
			margin: 0;
		}
		h1 {
			font-size: 5em;
			margin: 0;
		}
		h2 {
			font-weight: normal;
			margin: 10px 0 20px;
		}
		p {
			font-size: 1.2em;
			color: #bbbbbb;
		}
		a {
			color: #00bcd4;
			text-decoration: none;
			border: 1px solid #00bcd4;
			padding: 10px 20px;
			border-radius: 5px;
			margin-top: 20px;
			transition: 0.3s;
		}
		a:hover {
			background-color: #00bcd4;
			color: #1e1e1e;
		}
	</style>
</head>
<body>
	<h1>500</h1>
	<h2>Oups ! Erreur interne du serveur.</h2>
    <p>Le serveur <strong>Webserv</strong> a rencontré une erreur interne. Veuillez réessayer plus tard.</p>
	<a href="/">Retour à l'accueil</a>
</body>
</html>
